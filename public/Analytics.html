<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리턴핏 통계</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    * { font-family: 'Pretendard', sans-serif; }
    body { margin: 0; }
  </style>
</head>
<body class="bg-[#e8e4de]">
<div class="ui-screen flex items-center justify-center min-h-screen p-4">
  <div id="app" class="relative w-full max-w-[1440px] min-h-[1024px] bg-[#f7f5f2] rounded-3xl shadow-2xl overflow-hidden flex flex-col">
    <header class="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-slate-100/70 px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a href="Main.html" class="text-xl font-bold tracking-tight text-slate-800">리턴핏</a>
        <nav class="flex flex-wrap items-center gap-6 text-sm font-medium text-slate-500">
          <a href="Self_Inspection1.html" class="hover:text-indigo-600 transition-colors">자가점검</a>
          <a href="Job_Posting.html" class="hover:text-indigo-600 transition-colors">채용정보</a>
          <a href="Recruitment_Information.html" class="hover:text-indigo-600 transition-colors">보조금24</a>
          <a href="Trainning.html" class="hover:text-indigo-600 transition-colors">훈련과정</a>
          <a href="Support_Agency.html" class="hover:text-indigo-600 transition-colors">도움기관</a>
          <a href="Ai_Agent.html" class="hover:text-indigo-600 transition-colors">AI 도우미</a>
          <a href="Analytics.html" class="text-indigo-600 font-semibold">통계</a>
        </nav>
      </div>
    </header>

    <main class="flex-1 px-8 pt-8 pb-8 space-y-6">
      <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <p class="text-xs text-indigo-600 font-semibold mb-1">DB 기반 집계</p>
            <h2 class="text-2xl font-semibold text-slate-800">자가검진 참여 통계</h2>
            <p class="text-sm text-slate-500 mt-2">프로필 이름과 공개 ID는 집계에 쓰지 않고, 연령대·지역·관심직무·구직 준비도만 익명으로 요약합니다.</p>
          </div>
          <button id="refresh-btn" type="button" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-full text-sm font-semibold">새로고침</button>
        </div>
      </section>

      <section id="summary-cards" class="grid grid-cols-1 md:grid-cols-4 gap-4"></section>

      <section class="grid grid-cols-1 xl:grid-cols-[1.2fr_0.8fr] gap-6">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
          <h3 class="text-lg font-semibold text-slate-800 mb-4">연령대별 구직 준비도</h3>
          <div id="age-table" class="overflow-x-auto"></div>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
          <h3 class="text-lg font-semibold text-slate-800 mb-4">전체 관심직무 TOP</h3>
          <div id="job-bars" class="space-y-3"></div>
        </div>
      </section>

      <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
          <h3 class="text-base font-semibold text-slate-800 mb-4">지역 분포</h3>
          <div id="region-bars" class="space-y-3"></div>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
          <h3 class="text-base font-semibold text-slate-800 mb-4">구직 준비도 구간</h3>
          <div id="readiness-bars" class="space-y-3"></div>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
  function sumValues(data = {}) {
    return Object.values(data).reduce((sum, value) => sum + Number(value || 0), 0);
  }

  function sortedEntries(data = {}) {
    return Object.entries(data).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "ko"));
  }

  function renderBars(targetId, data = {}) {
    const target = document.getElementById(targetId);
    const total = Math.max(1, sumValues(data));
    const entries = sortedEntries(data);
    if (!entries.length) {
      target.innerHTML = `<p class="text-sm text-slate-400">아직 집계 데이터가 없어요.</p>`;
      return;
    }
    target.innerHTML = entries.map(([label, count]) => {
      const percent = Math.round((count / total) * 100);
      return `<div>
        <div class="flex items-center justify-between text-sm mb-1">
          <span class="font-medium text-slate-700">${label}</span>
          <span class="text-slate-400">${count}명 · ${percent}%</span>
        </div>
        <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
          <div class="h-full bg-indigo-500 rounded-full" style="width:${percent}%"></div>
        </div>
      </div>`;
    }).join("");
  }

  function renderSummary(stats) {
    const cards = [
      ["전체 프로필", stats.totalProfiles, "랜덤 ID 기준"],
      ["기본정보 입력", stats.totalBasicInfo, "연령·지역·관심직무"],
      ["구직체크 완료", stats.totalCompletedReentry, "준비도 산출 인원"],
      ["평균 준비도", stats.overall.readinessAverage, "100점 만점"],
    ];
    document.getElementById("summary-cards").innerHTML = cards.map(([title, value, desc]) => `
      <article class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <p class="text-xs text-slate-400 font-medium">${title}</p>
        <p class="text-3xl font-bold text-indigo-600 mt-2">${value}</p>
        <p class="text-sm text-slate-500 mt-2">${desc}</p>
      </article>
    `).join("");
  }

  function renderAgeTable(ageGroups = {}) {
    const entries = Object.entries(ageGroups).sort((a, b) => a[0].localeCompare(b[0], "ko"));
    if (!entries.length) {
      document.getElementById("age-table").innerHTML = `<p class="text-sm text-slate-400">아직 연령대 데이터가 없어요.</p>`;
      return;
    }
    document.getElementById("age-table").innerHTML = `
      <table class="w-full text-sm">
        <thead>
          <tr class="text-left text-slate-400 border-b border-slate-100">
            <th class="py-3 pr-4">연령대</th>
            <th class="py-3 pr-4">참여</th>
            <th class="py-3 pr-4">구직체크 완료</th>
            <th class="py-3 pr-4">평균 준비도</th>
            <th class="py-3 pr-4">주요 관심직무</th>
          </tr>
        </thead>
        <tbody>
          ${entries.map(([age, item]) => {
            const topJob = sortedEntries(item.jobs)[0]?.[0] || "-";
            return `<tr class="border-b border-slate-100 text-slate-700">
              <td class="py-3 pr-4 font-semibold">${age}</td>
              <td class="py-3 pr-4">${item.participants}</td>
              <td class="py-3 pr-4">${item.completedReentry}</td>
              <td class="py-3 pr-4">${item.readinessAverage}</td>
              <td class="py-3 pr-4">${topJob}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    `;
  }

  async function loadAnalytics() {
    const response = await fetch("/api/analytics/summary");
    const stats = await response.json();
    renderSummary(stats);
    renderAgeTable(stats.ageGroups);
    renderBars("job-bars", stats.overall.jobs);
    renderBars("region-bars", stats.overall.regions);
    renderBars("readiness-bars", stats.overall.readinessBuckets);
  }

  document.getElementById("refresh-btn").addEventListener("click", loadAnalytics);
  loadAnalytics().catch(() => {
    document.getElementById("summary-cards").innerHTML = `<div class="bg-white rounded-2xl p-5 border border-slate-100 text-sm text-rose-600">통계를 불러오지 못했어요.</div>`;
  });
</script>
</body>
</html>

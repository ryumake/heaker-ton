<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리턴핏 채용정보</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- 공개 엔드포인트 설정 파일 -->
    <script src="returnfit-api-config.js"></script>
    <script src="returnfit-recommendations.js"></script>

    <style>
        * { font-family: 'Pretendard', sans-serif; }
        body { margin: 0; }
    </style>
</head>

<body class="bg-[#e8e4de]">
<div class="ui-screen flex items-center justify-center min-h-screen p-4">
    <div id="app" class="relative w-full max-w-[1440px] min-h-[1024px] bg-[#f7f5f2] rounded-3xl shadow-2xl overflow-visible flex flex-col">

        <!-- 상단 네비게이션 -->
        <header id="header" class="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-slate-100/70 px-8 py-4 flex items-center justify-between rounded-t-3xl">
            <div class="flex items-center gap-8">
                <a href="Main.html" class="text-xl font-bold tracking-tight text-slate-800">리턴핏</a>
                <nav class="flex flex-wrap items-center gap-6 text-sm font-medium text-slate-500">
                    <a href="Self_Inspection1.html" class="hover:text-indigo-600 transition-colors">자가점검</a>
                    <a href="Job_Posting.html" class="text-indigo-600 font-semibold">채용정보</a>
          <a href="Recruitment_Information.html" class="hover:text-indigo-600 transition-colors">보조금24</a>
                    <a href="Trainning.html" class="hover:text-indigo-600 transition-colors">훈련과정</a>
                    <a href="Support_Agency.html" class="hover:text-indigo-600 transition-colors">도움기관</a>
                    <a href="Ai_Agent.html" class="hover:text-indigo-600 transition-colors">AI 도우미</a>
                </nav>
            </div>
        </header>

        <main id="content" class="flex-1 px-8 pt-8 pb-8 space-y-6">
            <!-- 필터 -->
            <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                <div class="flex items-center justify-between gap-4 flex-wrap mb-4">
                    <div>
                        <h2 class="text-2xl font-semibold text-slate-800">채용정보</h2>
                        <p class="text-sm text-slate-500 mt-1">스크롤을 내리면 고용24 채용공고가 자동으로 더 표시돼요.</p>
                    </div>
                    <span id="visible-count" class="bg-indigo-50 text-indigo-700 text-sm px-4 py-2 rounded-full font-semibold">0개 표시 중</span>
                </div>

                <div id="region-filter" class="flex flex-wrap gap-2">
                    <button data-region="전체" class="region-btn bg-indigo-600 text-white border border-indigo-600 px-4 py-2 rounded-full text-sm font-semibold transition-all">전체</button>
                    <button data-region="경기도" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">경기도</button>
                    <button data-region="강원도" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">강원도</button>
                    <button data-region="충청북도" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">충청북도</button>
                    <button data-region="충청남도" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">충청남도</button>
                    <button data-region="전라북도" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">전라북도</button>
                    <button data-region="전라남도" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">전라남도</button>
                    <button data-region="경상북도" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">경상북도</button>
                    <button data-region="경상남도" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">경상남도</button>
                </div>
            </section>

            <!-- 채용공고 리스트 -->
            <section id="job-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></section>

            <!-- 로딩 표시 -->
            <div id="loading" class="hidden flex justify-center py-8 text-sm text-slate-500">
                <div class="flex items-center gap-2 bg-white border border-slate-100 rounded-full px-5 py-3 shadow-sm">
                    <i class="fa-solid fa-spinner fa-spin text-indigo-500"></i>
                    <span>채용공고를 불러오는 중이에요...</span>
                </div>
            </div>

            <!-- 감지용 요소 -->
            <div id="scroll-sentinel" class="h-10"></div>
        </main>

        <footer class="px-8 pb-6 pt-2 text-center text-xs text-slate-400 border-t border-slate-100 mt-auto">
            <p>리턴핏 청년 체크인 · 채용정보 API 연동</p>
        </footer>
    </div>
</div>

<script>
    const PAGE_SIZE = 6;

    let selectedRegion = "전체";
    let currentPage = 1;
    let renderedCount = 0;
    let totalCount = 0;
    let isLoading = false;
    let hasMore = true;

    const jobList = document.getElementById("job-list");
    const loading = document.getElementById("loading");
    const visibleCount = document.getElementById("visible-count");
    const sentinel = document.getElementById("scroll-sentinel");

    function getText(node, selector) {
        return node.querySelector(selector)?.textContent?.trim() || "";
    }

    function formatYmd(value) {
        const text = String(value || "");
        if (text.length !== 8) return text;
        return `${text.slice(0, 4)}.${text.slice(4, 6)}.${text.slice(6, 8)}`;
    }

    function absolutizeUrl(url) {
        if (!url) return "https://www.work24.go.kr";
        if (url.startsWith("http")) return url;
        return `https://www.work24.go.kr${url.startsWith("/") ? "" : "/"}${url}`;
    }

    function parseJobXml(xmlText) {
        const doc = new DOMParser().parseFromString(xmlText, "text/xml");

        const parserError = doc.querySelector("parsererror");
        if (parserError) {
            throw new Error("API 응답을 해석할 수 없습니다.");
        }

        const apiError = doc.querySelector("error")?.textContent?.trim();
        if (apiError) {
            throw new Error(apiError);
        }

        totalCount = Number(getText(doc, "total") || getText(doc, "totalCount") || 0);

        const worknetItems = [...doc.querySelectorAll("wanted")].map(item => {
            const region = getText(item, "region");
            const closeDt = getText(item, "closeDt");
            const career = getText(item, "career");
            const salTpNm = getText(item, "salTpNm");
            const sal = getText(item, "sal");
            const salary = `${salTpNm} ${sal}`.trim();

            return {
                authNo: getText(item, "wantedAuthNo"),
                company: getText(item, "company"),
                title: getText(item, "title"),
                region,
                type: career || "경력무관",
                salary: salary || "급여 확인",
                deadline: closeDt || "마감일 확인",
                tags: [
                    career || "경력무관",
                    salary || "급여 확인",
                    region || "지역 확인"
                ].filter(Boolean),
                url: absolutizeUrl(
                    getText(item, "wantedInfoUrl") || getText(item, "wantedMobileInfoUrl")
                )
            };
        }).filter(job => job.title);

        const openRecruitItems = [...doc.querySelectorAll("dhsOpenEmpInfo")].map(item => {
            const companyType = getText(item, "coClcdNm");
            const employmentType = getText(item, "empWantedTypeNm");
            return {
                authNo: getText(item, "empSeqno"),
                company: getText(item, "empBusiNm"),
                title: getText(item, "empWantedTitle"),
                region: companyType || "공채",
                type: employmentType || "공채",
                salary: "조건 확인",
                deadline: formatYmd(getText(item, "empWantedEndt")) || "마감일 확인",
                tags: [companyType, employmentType, "공채속보"].filter(Boolean),
                url: absolutizeUrl(getText(item, "empWantedHomepgDetail") || getText(item, "empWantedMobileUrl"))
            };
        }).filter(job => job.title);

        return worknetItems.length ? worknetItems : openRecruitItems;
    }

    async function fetchJobs() {
        const endpoint = window.RETURNFIT_API_ENDPOINTS?.jobPostings || "/api/job-postings";

        if (!endpoint) {
            throw new Error("채용정보 endpoint 설정이 없습니다.");
        }

        const params = new URLSearchParams({
            page: String(currentPage),
            display: String(PAGE_SIZE)
        });

        /*
          고용24 채용정보 API의 지역 파라미터명이 다를 수 있어요.
          regionNm이 안 먹으면 고용24 API 문서에서 지역 파라미터명을 확인해서
          아래 한 줄만 바꾸면 됩니다.
        */
        if (selectedRegion !== "전체") {
            params.set("regionNm", selectedRegion);
        }

        const response = await fetch(`${endpoint}?${params.toString()}`);

        if (!response.ok) {
            const contentType = response.headers.get("content-type") || "";
            if (contentType.includes("application/json")) {
                const data = await response.json();
                throw new Error(data.hint || data.detail || data.error || "고용24 API 요청 실패");
            }
            throw new Error("고용24 API 요청 실패");
        }

        const xmlText = await response.text();
        const jobs = parseJobXml(xmlText);

        return jobs;
    }

    function createJobCard(job) {
        const tagHtml = job.tags.map(tag =>
            `<span class="bg-slate-50 text-slate-500 text-xs px-2.5 py-1 rounded-md border border-slate-200">${tag}</span>`
        ).join("");
        const recommendationBadge = job.recommendationRank
            ? `<div class="mb-3 flex flex-wrap items-center gap-2">
                <span class="bg-indigo-600 text-white text-xs px-3 py-1 rounded-full font-semibold">추천 ${job.recommendationRank}</span>
                <span class="text-xs text-indigo-600 font-medium">${job.recommendationReason}</span>
              </div>`
            : "";

        return `
      <article class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-all">
        ${recommendationBadge}
        <div class="flex items-start justify-between mb-3">
          <span class="bg-blue-50 text-blue-700 text-xs px-3 py-1 rounded-full">${job.region || "지역 확인"}</span>
          <button type="button" class="bookmark text-slate-300 hover:text-indigo-500 transition-colors" aria-label="관심 공고 저장">
            <i class="fa-regular fa-bookmark"></i>
          </button>
        </div>

        <h3 class="text-sm font-semibold text-slate-800 mb-0.5 leading-snug">${job.title}</h3>

        <p class="text-xs text-slate-500 mb-3">
          ${job.company || "회사명 확인 필요"} · ${job.type || "고용형태 확인"} · ${job.salary || "급여 확인"}
        </p>

        <div class="flex flex-wrap gap-1.5 mb-4">${tagHtml}</div>

        <div class="border-t border-slate-100 pt-3 flex items-center justify-between">
          <span class="text-xs text-slate-400">
            <i class="fa-regular fa-clock mr-1"></i>${job.deadline || "마감일 확인"}
          </span>
          <a href="${job.url}" target="_blank" rel="noopener noreferrer"
             class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs px-4 py-1.5 rounded-full font-medium transition-colors">
            지원하기
          </a>
        </div>
      </article>
    `;
    }

    function renderEmptyState(message = "선택한 지역의 공고가 아직 없어요.", subMessage = "다른 지역을 선택해보세요.") {
        jobList.innerHTML = `
      <div class="col-span-full bg-white rounded-2xl p-10 text-center border border-slate-100">
        <p class="text-slate-600 font-medium">${message}</p>
        <p class="text-sm text-slate-400 mt-2">${subMessage}</p>
      </div>
    `;
    }

    async function renderNextJobs() {
        if (isLoading || !hasMore) return;

        isLoading = true;
        loading.classList.remove("hidden");

        try {
            let jobs = await fetchJobs();
            if (renderedCount === 0) {
                jobs = await window.ReturnFitRecommendations.recommend("jobs", jobs);
            }

            if (jobs.length === 0 && renderedCount === 0) {
                renderEmptyState();
                hasMore = false;
                return;
            }

            if (jobs.length === 0) {
                hasMore = false;
                return;
            }

            jobList.insertAdjacentHTML("beforeend", jobs.map(createJobCard).join(""));

            renderedCount += jobs.length;
            currentPage += 1;

            if (totalCount > 0) {
                visibleCount.textContent = `${renderedCount}개 표시 중`;
                if (renderedCount >= totalCount) {
                    hasMore = false;
                }
            } else {
                visibleCount.textContent = `${renderedCount}개 표시 중`;
                if (jobs.length < PAGE_SIZE) {
                    hasMore = false;
                }
            }

        } catch (error) {
            hasMore = false;
            visibleCount.textContent = "API 확인 필요";

            renderEmptyState(
                "채용공고를 불러오지 못했어요.",
                error.message || "API 키, endpoint, CORS 상태를 확인해 주세요."
            );

        } finally {
            loading.classList.add("hidden");
            isLoading = false;
        }
    }

    function resetList(region) {
        selectedRegion = region;
        currentPage = 1;
        renderedCount = 0;
        totalCount = 0;
        isLoading = false;
        hasMore = true;

        jobList.innerHTML = "";
        visibleCount.textContent = "0개 표시 중";

        renderNextJobs();
    }

    function setActiveRegionButton(clickedButton) {
        document.querySelectorAll(".region-btn").forEach(btn => {
            btn.className = "region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all";
        });

        clickedButton.className = "region-btn bg-indigo-600 text-white border border-indigo-600 px-4 py-2 rounded-full text-sm font-semibold transition-all";
    }

    document.getElementById("region-filter").addEventListener("click", event => {
        const button = event.target.closest(".region-btn");
        if (!button) return;

        setActiveRegionButton(button);
        resetList(button.dataset.region);
    });

    document.addEventListener("click", event => {
        const bookmark = event.target.closest(".bookmark");

        if (bookmark) {
            bookmark.classList.toggle("text-indigo-500");
            bookmark.classList.toggle("text-slate-300");

            const icon = bookmark.querySelector("i");
            icon.classList.toggle("fa-regular");
            icon.classList.toggle("fa-solid");
        }
    });

    const observer = new IntersectionObserver(entries => {
        if (entries.some(entry => entry.isIntersecting)) {
            renderNextJobs();
        }
    }, {
        root: null,
        rootMargin: "500px",
        threshold: 0
    });

    observer.observe(sentinel);

    window.addEventListener("scroll", () => {
        const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 700;
        if (nearBottom) renderNextJobs();
    });

    renderNextJobs();
</script>
</body>
</html>

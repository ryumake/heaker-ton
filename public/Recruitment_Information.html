<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리턴핏 보조금24</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="returnfit-api-config.js"></script>
    <script src="returnfit-recommendations.js"></script>

    <style>
        * { font-family: 'Pretendard', sans-serif; }
        body { margin: 0; }

        .line-clamp-1 {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-[#f7f5f2]">
<div class="ui-screen min-h-screen">
    <div id="app" class="relative w-full min-h-screen bg-[#f7f5f2] overflow-visible flex flex-col">

        <header id="header" class="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-slate-100/70 px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="Main.html" class="text-xl font-bold tracking-tight text-slate-800">리턴핏</a>
                <nav class="flex flex-wrap items-center gap-6 text-sm font-medium text-slate-500">
                    <a href="Self_Inspection1.html" class="hover:text-indigo-600 transition-colors">자가점검</a>
                    <a href="Job_Posting.html" class="hover:text-indigo-600 transition-colors">채용정보</a>
                    <a href="Recruitment_Information.html" class="text-indigo-600 font-semibold">보조금24</a>
                    <a href="Trainning.html" class="hover:text-indigo-600 transition-colors">훈련과정</a>
                    <a href="Support_Agency.html" class="hover:text-indigo-600 transition-colors">도움기관</a>
                    <a href="Ai_Agent.html" class="hover:text-indigo-600 transition-colors">AI 도우미</a>
                </nav>
            </div>
        </header>

        <main id="content" class="flex-1 px-6 pt-8 pb-10 space-y-6">

            <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <div class="flex items-center justify-between gap-4 flex-wrap mb-5">
                    <div>
                        <h2 class="text-2xl font-semibold text-slate-800">보조금24</h2>
                        <p class="text-sm text-slate-500 mt-2">정부24 서비스 목록 API에서 청년 지원금과 공공혜택 정보를 불러옵니다.</p>
                    </div>

                    <span id="result-count" class="bg-indigo-50 text-indigo-700 text-sm px-4 py-2 rounded-full font-semibold">
            불러오는 중
          </span>
                </div>

                <div id="region-filter" class="flex flex-wrap gap-2 mb-4">
                    <button data-region="전체" class="region-btn bg-indigo-600 text-white border border-indigo-600 px-4 py-2 rounded-full text-sm font-semibold transition-all">전체</button>
                    <button data-region="서울" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">서울</button>
                    <button data-region="경기" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">경기</button>
                    <button data-region="부산" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">부산</button>
                    <button data-region="대전" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">대전</button>
                    <button data-region="광주" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">광주</button>
                    <button data-region="인천" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">인천</button>
                    <button data-region="대구" class="region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all">대구</button>
                </div>

                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input
                            id="keyword-input"
                            type="search"
                            placeholder="서비스명, 기관명, 키워드 검색 후 Enter"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3 pl-11 pr-4 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-300"
                    >
                </div>
            </section>

            <section id="job-list" class="grid grid-cols-1 md:grid-cols-2 gap-5"></section>

            <div id="loading" class="flex justify-center py-8 text-sm text-slate-500">
                <div class="flex items-center gap-2 bg-white border border-slate-100 rounded-full px-5 py-3 shadow-sm">
                    <i class="fa-solid fa-spinner fa-spin text-indigo-500"></i>
                    <span>지원 정보를 불러오는 중이에요...</span>
                </div>
            </div>

            <div id="empty-state" class="hidden bg-white rounded-2xl p-10 text-center border border-slate-100">
                <p class="text-slate-600 font-medium">표시할 지원 정보가 없어요.</p>
                <p class="text-sm text-slate-400 mt-2">검색어 또는 지역 필터를 바꿔보세요.</p>
                <a
                        href="https://www.gov.kr"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="inline-flex mt-5 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-full text-sm font-semibold transition-all"
                >
                    정부24 열기
                </a>
            </div>

            <div id="pagination" class="hidden flex items-center justify-center gap-2 pt-2"></div>
        </main>
    </div>
</div>

<script>
    const PAGE_SIZE = 10;

    let currentPage = 1;
    let keyword = "";
    let selectedRegion = "전체";
    let totalCount = 0;
    let activeRequestId = 0;

    const jobList = document.getElementById("job-list");
    const resultCount = document.getElementById("result-count");
    const loading = document.getElementById("loading");
    const emptyState = document.getElementById("empty-state");
    const pagination = document.getElementById("pagination");
    const keywordInput = document.getElementById("keyword-input");
    const regionFilter = document.getElementById("region-filter");

    const REGION_API_KEYWORD = {
        전체: "",
        서울: "서울특별시",
        경기: "경기도",
        부산: "부산광역시",
        대전: "대전광역시",
        광주: "광주광역시",
        인천: "인천광역시",
        대구: "대구광역시"
    };

    function pick(item, keys, fallback = "") {
        for (const key of keys) {
            const value = item[key];

            if (value !== undefined && value !== null && String(value).trim() !== "") {
                return String(value).trim();
            }
        }

        return fallback;
    }

    function truncateText(text, maxLength = 80) {
        const value = String(text || "").replace(/\s+/g, " ").trim();

        if (!value) return "";
        if (value.length <= maxLength) return value;

        return `${value.slice(0, maxLength)}...`;
    }

    function getShortRegion(item) {
        const rawRegion = pick(item, [
            "시도명",
            "지역",
            "지역명",
            "소관기관명"
        ], "");

        if (!rawRegion) return "전국";

        if (rawRegion.includes("서울")) return "서울";
        if (rawRegion.includes("경기")) return "경기";
        if (rawRegion.includes("부산")) return "부산";
        if (rawRegion.includes("대전")) return "대전";
        if (rawRegion.includes("광주")) return "광주";
        if (rawRegion.includes("인천")) return "인천";
        if (rawRegion.includes("대구")) return "대구";

        return "전국";
    }

    function makeGov24Url(item) {
        const directUrl = pick(item, [
            "상세조회URL",
            "서비스URL",
            "url",
            "URL",
            "링크",
            "신청URL",
            "온라인신청사이트URL"
        ]);

        if (directUrl && directUrl.startsWith("http")) {
            return directUrl;
        }

        const serviceId = pick(item, [
            "서비스ID",
            "serviceId",
            "서비스아이디"
        ]);

        if (serviceId) {
            return `https://www.gov.kr/portal/rcvfvrSvc/dtlEx/${encodeURIComponent(serviceId)}`;
        }

        return "https://www.gov.kr";
    }

    function normalizeServiceItem(item) {
        const title = pick(item, [
            "서비스명",
            "서비스명칭",
            "serviceName",
            "서비스목적요약",
            "서비스ID"
        ], "서비스명 확인 필요");

        const company = pick(item, [
            "소관기관명",
            "기관명",
            "부서명",
            "소관기관",
            "제공기관명"
        ], "기관 확인 필요");

        const category = pick(item, [
            "서비스분야",
            "지원유형",
            "서비스유형",
            "분야"
        ], "정부지원");

        const supportType = pick(item, [
            "지원유형",
            "서비스유형"
        ], "서비스");

        const summary = pick(item, [
            "서비스목적요약",
            "지원내용",
            "선정기준"
        ], "지원내용 확인");

        const deadline = pick(item, [
            "신청기한",
            "접수기간",
            "수정일시",
            "등록일시"
        ], "상시신청");

        return {
            title: truncateText(title, 46),
            company: truncateText(company, 24),
            region: getShortRegion(item),
            type: truncateText(category, 16),
            supportType: truncateText(supportType, 14),
            summary: truncateText(summary, 115),
            deadline: truncateText(deadline, 32),
            url: makeGov24Url(item),
            raw: item,
            tags: [
                truncateText(category, 12),
                truncateText(supportType, 12)
            ].filter(Boolean)
        };
    }

    async function fetchJobs() {
        const params = new URLSearchParams({
            page: String(currentPage),
            perPage: String(PAGE_SIZE),
            region: REGION_API_KEYWORD[selectedRegion] || "",
            keyword
        });

        const endpoint = window.RETURNFIT_API_ENDPOINTS?.publicServices || "http://localhost:5607/api/public-services";
        const response = await fetch(`${endpoint}?${params.toString()}`);
        if (!response.ok) {
            const contentType = response.headers.get("content-type") || "";
            if (contentType.includes("application/json")) {
                const data = await response.json();
                throw new Error(data.detail || data.error || `공공데이터포털 API 요청 실패: ${response.status}`);
            }
            throw new Error(`공공데이터포털 API 요청 실패: ${response.status}`);
        }

        const data = await response.json();
        totalCount = Number(data.totalCount || data.total || data.matchCount || 0);

        let services = (data.data || []).map(normalizeServiceItem);

        /*
          혹시 API 조건 검색이 느슨하게 먹을 경우를 대비해서
          한 번 더 클라이언트에서 보정 필터링.
        */
        if (selectedRegion !== "전체") {
            services = services.filter(item => item.region === selectedRegion);
        }

        if (keyword) {
            const lowered = keyword.toLowerCase();

            services = services.filter(item => {
                const searchableText = [
                    item.title,
                    item.company,
                    item.region,
                    item.type,
                    item.supportType,
                    item.summary,
                    pick(item.raw, ["지원대상"], "")
                ].join(" ").toLowerCase();

                return searchableText.includes(lowered);
            });
        }

        return services;
    }

    function createJobCard(job) {
        const tagHtml = job.tags.map(tag =>
            `<span class="bg-slate-50 text-slate-500 text-xs px-2.5 py-1 rounded-md border border-slate-200">${tag}</span>`
        ).join("");
        const recommendationBadge = job.recommendationRank
            ? `<div class="mb-3 flex flex-wrap items-center gap-2">
                <span class="bg-indigo-600 text-white text-xs px-3 py-1 rounded-full font-semibold">추천 ${job.recommendationRank}</span>
                <span class="text-xs text-indigo-600 font-medium">${job.recommendationReason}</span>
              </div>`
            : "";

        return `
      <article class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-all min-h-[250px] flex flex-col">
        ${recommendationBadge}
        <div class="flex items-start justify-between mb-3">
          <span class="bg-blue-50 text-blue-700 text-xs px-3 py-1 rounded-full max-w-[130px] truncate">
            ${job.region || "전국"}
          </span>

          <button type="button" class="bookmark text-slate-300 hover:text-indigo-500 transition-colors" aria-label="관심 정보 저장">
            <i class="fa-regular fa-bookmark"></i>
          </button>
        </div>

        <h3 class="text-sm font-semibold text-slate-800 mb-1 leading-snug line-clamp-2">
          ${job.title}
        </h3>

        <p class="text-xs text-slate-500 mb-3 truncate">
          ${job.company || "기관 확인 필요"}
        </p>

        <div class="space-y-2 text-xs text-slate-500 mb-4">
          <p class="flex items-start gap-1">
            <i class="fa-regular fa-clock mt-0.5 text-slate-400"></i>
            <span class="line-clamp-1">${job.deadline || "상시 또는 확인 필요"}</span>
          </p>

          <p class="flex items-start gap-1">
            <i class="fa-regular fa-building mt-0.5 text-slate-400"></i>
            <span class="line-clamp-2">${job.summary || "지원내용 확인"}</span>
          </p>
        </div>

        <div class="flex flex-wrap gap-1.5 mb-4">
          ${tagHtml}
        </div>

        <a
          href="${job.url}"
          target="_blank"
          rel="noopener noreferrer"
          class="mt-auto block w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs px-4 py-2.5 rounded-full font-medium transition-colors text-center"
        >
          자세히 보기
        </a>
      </article>
    `;
    }

    function renderPagination() {
        const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));

        if (totalPages <= 1) {
            pagination.classList.add("hidden");
            pagination.innerHTML = "";
            return;
        }

        pagination.classList.remove("hidden");

        pagination.innerHTML = `
      <button
        type="button"
        data-page="prev"
        class="px-4 py-2 rounded-full text-sm border ${
            currentPage <= 1
                ? "bg-slate-100 text-slate-300 border-slate-100"
                : "bg-white text-slate-600 border-slate-200 hover:border-indigo-300"
        }"
        ${currentPage <= 1 ? "disabled" : ""}
      >
        이전
      </button>

      <span class="px-4 py-2 text-sm text-slate-500">
        ${currentPage} / ${totalPages}
      </span>

      <button
        type="button"
        data-page="next"
        class="px-4 py-2 rounded-full text-sm border ${
            currentPage >= totalPages
                ? "bg-slate-100 text-slate-300 border-slate-100"
                : "bg-white text-slate-600 border-slate-200 hover:border-indigo-300"
        }"
        ${currentPage >= totalPages ? "disabled" : ""}
      >
        다음
      </button>
    `;
    }

    async function renderJobs() {
        const requestId = ++activeRequestId;
        loading.classList.remove("hidden");
        emptyState.classList.add("hidden");
        pagination.classList.add("hidden");
        pagination.innerHTML = "";
        jobList.innerHTML = "";

        try {
            const jobs = await fetchJobs();
            if (requestId !== activeRequestId) return;
            const recommendedJobs = await window.ReturnFitRecommendations.recommend("jobs", jobs);
            if (requestId !== activeRequestId) return;

            resultCount.textContent = totalCount
                ? `전체 ${totalCount.toLocaleString()}건`
                : `${jobs.length}건 표시`;

            if (!jobs.length) {
                emptyState.classList.remove("hidden");
                emptyState.querySelector("p").textContent = "표시할 지원 정보가 없어요.";
                emptyState.querySelector(".text-sm").textContent = "검색어 또는 지역 필터를 바꿔보세요.";
                return;
            }

            jobList.innerHTML = recommendedJobs.map(createJobCard).join("");
            renderPagination();

        } catch (error) {
            if (requestId !== activeRequestId) return;
            console.error(error);

            resultCount.textContent = "API 확인 필요";

            emptyState.classList.remove("hidden");
            emptyState.querySelector("p").textContent = "공공데이터포털 서비스 목록을 불러오지 못했어요.";
            emptyState.querySelector(".text-sm").textContent =
                error.message || "GOV24_SERVICE_API_KEY와 endpoint 설정을 확인해야 합니다.";

            pagination.classList.add("hidden");
            pagination.innerHTML = "";

        } finally {
            loading.classList.add("hidden");
        }
    }

    function setActiveRegionButton(clickedButton) {
        document.querySelectorAll(".region-btn").forEach(btn => {
            btn.className = "region-btn bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 px-4 py-2 rounded-full text-sm font-medium transition-all";
        });

        clickedButton.className = "region-btn bg-indigo-600 text-white border border-indigo-600 px-4 py-2 rounded-full text-sm font-semibold transition-all";
    }

    regionFilter.addEventListener("click", event => {
        const button = event.target.closest(".region-btn");
        if (!button) return;

        setActiveRegionButton(button);

        selectedRegion = button.dataset.region;
        currentPage = 1;

        renderJobs();
    });

    keywordInput.addEventListener("keydown", event => {
        if (event.key !== "Enter") return;

        keyword = keywordInput.value.trim();
        currentPage = 1;

        renderJobs();
    });

    pagination.addEventListener("click", event => {
        const button = event.target.closest("button[data-page]");
        if (!button) return;

        if (button.dataset.page === "prev" && currentPage > 1) {
            currentPage -= 1;
        }

        if (button.dataset.page === "next") {
            currentPage += 1;
        }

        renderJobs();
    });

    document.addEventListener("click", event => {
        const bookmark = event.target.closest(".bookmark");

        if (!bookmark) return;

        bookmark.classList.toggle("text-indigo-500");
        bookmark.classList.toggle("text-slate-300");

        const icon = bookmark.querySelector("i");
        icon.classList.toggle("fa-regular");
        icon.classList.toggle("fa-solid");
    });

    renderJobs();
</script>
</body>
</html>
